<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyProxy ReDoc</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f8fafc;
            font-family: Arial, sans-serif;
        }

        .fallback {
            display: none;
            max-width: 900px;
            margin: 48px auto;
            padding: 24px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .fallback h1 {
            margin-top: 0;
            color: #0f172a;
        }

        .fallback a {
            color: #0284c7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <redoc spec-url="/openapi.json"></redoc>

    <div id="fallback" class="fallback">
        <h1>ReDoc non disponibile</h1>
        <p>La vista ReDoc non si e caricata correttamente dal CDN.</p>
        <p>Puoi usare <a href="/docs">/docs</a> per Swagger UI oppure aprire <a href="/openapi.json">/openapi.json</a>.</p>
    </div>

    <script>
        window.addEventListener('error', function (event) {
            if (event && event.target && event.target.tagName === 'SCRIPT') {
                document.getElementById('fallback').style.display = 'block';
            }
        }, true);
    </script>
    <script src="https://unpkg.com/redoc@2.1.3/bundles/redoc.standalone.js"></script>
</body>
</html>
